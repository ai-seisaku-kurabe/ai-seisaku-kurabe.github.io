name: watch-sources
# ①収集班: 未掲載の新しい一次情報が出ていないか見張る
on:
  schedule:
    - cron: '0 23 * * 1'   # 毎週月曜 JST 8:00
  workflow_dispatch:
permissions:
  contents: write
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # 統一会派の議員名簿を更新する。所属判定が変わった議員がいると失敗して通知する
      # （本当の移籍なら tools/roster_override.json に党名を書いて承認する）
      - name: 統一会派の名簿を更新
        working-directory: tools
        run: python build_roster.py
      - name: 名簿の差分をコミット
        if: always()
        run: |
          bash .github/scripts/commit_and_push.sh \
            "chore: 統一会派の議員名簿を更新" tools/roster.json
      - name: 新会期・新規発言の差分を検知
        run: python tools/agents/watch_sources.py --fail-on-new
