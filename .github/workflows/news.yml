name: update-news
# ①収集の一部: 毎日ニュース見出しを取得し、分野タグ付きで蓄積する
on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 JST 6:00
  workflow_dispatch:
permissions:
  contents: write
jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python update_news.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json news_archive.json
          git commit -m "chore: update news.json / news_archive.json" || echo "no changes"
          git push
      # 更新を検索エンジンへ通知する（新規ドメインはクロール間隔が長いため）
      - run: python tools/ping_indexnow.py
        continue-on-error: true   # 通知の失敗でニュース更新まで赤くしない
