name: health-check
# ⑥運用班: 公開サイトが壊れていないか毎日見張る
on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 JST 7:00
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: サイトの死活・構造・設定を点検
        run: python tools/agents/health_check.py
